<header>
  <a class="brand" routerLink="/">
    <img src="assets/icons/favicon/favicon-risk.svg" alt="Risk DSL" width="32" height="32" />
    <span class="brand-name">RISK DSL</span>
  </a>

  <nav>
    <a data-test-id="nav-home" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
    <a data-test-id="nav-binomial" routerLink="/binomial" routerLinkActive="active">Binomial</a>
    <a data-test-id="nav-bayes" routerLink="/bayes" routerLinkActive="active">Bayes</a>
    <a data-test-id="nav-doc" routerLink="/doc" routerLinkActive="active">Docs</a>
  </nav>

  @if (activeModel) {
    <div class="toolbar-actions">
      @for (btn of activeModel.toolbarButtons; track btn.label) {
        @if (btn.visible !== false) {
          <button
            [class.primary]="btn.variant === 'primary'"
            [class.secondary]="btn.variant === 'secondary'"
            [attr.data-test-id]="btn.testId"
            (click)="btn.action()"
          >
            @if (btn.icon) {
              <img [src]="btn.icon" class="btn-icon" alt="" />
            }
            {{ btn.label }}
          </button>
        }
      }
    </div>
  }
</header>

<main>
  <router-outlet (activate)="onActivate($event)" (deactivate)="onDeactivate()"></router-outlet>
</main>
