<div class="page-layout">
  <header class="app-topbar">
    <div class="topbar-brand">RISK PROBABILITY MODELS</div>
    <nav class="topbar-tabs">
      <button
        data-test-id="binomial"
        class="tab"
        [ngClass]="{ active: selectedModel === 'binomial' }"
        (click)="selectModel('binomial')"
      >
        Binomial
      </button>
      <button
        data-test-id="bayes"
        class="tab"
        [ngClass]="{ active: selectedModel === 'bayes' }"
        (click)="selectModel('bayes')"
      >
        Bayes
      </button>
    </nav>
    <div class="topbar-actions">
      <button data-test-id="import" (click)="fileInput.click()">Importar</button>
      <button data-test-id="export" (click)="exportCurrent()">Exportar</button>
      @if (selectedModel === 'binomial') {
        <button class="primary" (click)="triggerCalculate()">Calcular Probabilidad</button>
        @if (hasBinomialResults) {
          <button class="primary" (click)="openBinomialResults()">Ver Resultados</button>
        }
      }
      @if (selectedModel === 'bayes') {
        <button class="primary" (click)="triggerImportCSV()">Importar CSV</button>
        <button class="primary" (click)="triggerGenerateCSV()">Generar CSV</button>
        <button class="primary" (click)="triggerMonteCarlo()">Monte Carlo</button>
        @if (hasBayesHistory) {
          <button class="primary" (click)="openBayesHistory()">Ver Resultados</button>
        }
      }
      <input #fileInput type="file" accept="application/json,.json" hidden (change)="onImportFile($event)" />
    </div>
  </header>

  <section class="diagram-panel">
    @if (selectedModel === 'binomial') {
      <app-risk-simple></app-risk-simple>
    }
    @if (selectedModel === 'bayes') {
      <app-risk-bayes></app-risk-bayes>
    }
  </section>
</div>
