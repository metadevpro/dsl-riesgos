<div class="page-layout">
  <aside data-test-id="sidebar" class="models-sidebar" [ngClass]="{ collapsed: isSidebarCollapsed }">
    <div class="models-header">Probability models</div>
    <button data-test-id="binomial" class="model-item" [ngClass]="{ active: selectedModel === 'binomial' }" (click)="selectModel('binomial')">
      Binomial model
    </button>
    <button data-test-id="bayes" class="model-item" [ngClass]="{ active: selectedModel === 'bayes' }" (click)="selectModel('bayes')">Bayes model</button>

    <div class="io-separator"></div>

    <button
      data-test-id="export"
      class="model-item io-item"
      (click)="exportCurrent()"
    >
      Exportar
    </button>
    <button data-test-id="import" class="model-item io-item" (click)="fileInput.click()">Importar</button>
    <input #fileInput type="file" accept="application/json,.json" hidden (change)="onImportFile($event)" />
  </aside>

  <button
    class="sidebar-toggle"
    [ngClass]="{ collapsed: isSidebarCollapsed }"
    (click)="toggleSidebar()"
    [attr.aria-label]="isSidebarCollapsed ? 'Open models panel' : 'Close models panel'"
  >
    {{ isSidebarCollapsed ? '❯' : '❮' }}
  </button>

  <section class="diagram-panel">
    @if (selectedModel === 'binomial') {
      <app-risk-simple></app-risk-simple>
    }
    @if (selectedModel === 'bayes') {
      <app-risk-bayes></app-risk-bayes>
    }
  </section>
</div>
